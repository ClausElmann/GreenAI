name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-test-validate:
    name: Build · Test · Compliance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # ── Build (0 warnings enforced) ──────────────────────────────
      - name: Build — 0 warnings
        run: |
          dotnet build src/GreenAi.Api/GreenAi.Api.csproj \
            -v q \
            /property:TreatWarningsAsErrors=true \
            /consoleloggerparameters:NoSummary

      # ── Unit + Integration tests ─────────────────────────────────
      - name: Test — GreenAi.Tests
        run: dotnet test tests/GreenAi.Tests -v q --no-build

      # ── Governance compliance scan ───────────────────────────────
      - name: Compliance — Validate-GreenAiCompliance.ps1
        shell: pwsh
        run: |
          .\scripts\governance\Validate-GreenAiCompliance.ps1
