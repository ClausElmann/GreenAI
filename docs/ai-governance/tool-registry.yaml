# ── Governance Scripts ────────────────────────────────────────────────────────

governance_tools:
  compliance_scan:
    command: "pwsh -File scripts/governance/Validate-GreenAiCompliance.ps1"
    purpose: "Check SSOT rules, file size limits, forbidden patterns"
    mandatory_rules:
      - "Run after any structural changes"

  file_sizes:
    command: "pwsh -File scripts/governance/check-file-sizes.ps1"
    purpose: "Verify no SSOT doc exceeds 600-line limit"

---

# ── Artifact Readers ─────────────────────────────────────────────────────────

artifact_readers:
  test_trx:
    location: "tests/GreenAi.Tests/TestResults/*.trx"
    format: "XML"
    parse_with: "scripts/testing/Get-FailedTestsFromTrx.ps1"

  db_logs:
    location: "GreenAI_DEV.[dbo].[Logs]"
    parse_with: "scripts/testing/Get-Latest-Errors.ps1"
    notes: "Query last 10 min errors — Serilog writes here"

---

# ── Execution Rules ───────────────────────────────────────────────────────────

execution_rules:
  mandatory:
    - "Build before running tests: dotnet build src/GreenAi.Api/GreenAi.Api.csproj"
    - "0 compiler warnings after any change"
    - "SQL error → use sql_validator FIRST (5 sec vs 5 min)"
    - "Read file before editing (always)"
    - "Use --logger trx to enable TRX failure parsing"

  forbidden:
    - "Start-Process (opens new window) — run commands inline"
    - "Editing files without reading them first"
    - "Guessing SQL column names — validate against schema"
    - "git commit/push without explicit user approval"
    - "Copying code from sms-service or NeeoBovisWeb verbatim"

  db_server: "(localdb)\\MSSQLLocalDB"
  db_name: "GreenAI_DEV"
  api_url: "http://localhost:5057"
  health_url: "http://localhost:5057/api/ping"
  login_url: "http://localhost:5057/api/auth/login"

---

# ── UI Auto-Fix ───────────────────────────────────────────────────────────────

ui_auto_fix:
  description: >
    Runs full UI quality loop: executes E2E tests with quality gates,
    generates failures, applies deterministic fixes, and re-runs tests
    until all gates pass or max 3 iterations is reached.
  triggers:
    - "fix ui"
    - "run ui autofix"
    - "repair ui"
    - "ui broken"
    - "visual issues"
    - "accessibility issues"
    - "color contrast"
    - "touch target"
  inputs:
    - "TestResults/Visual/ui-failures.json (optional — auto-generated if missing)"
  execution:
    type: protocol
    path: "docs/SSOT/testing/ui-auto-fix-protocol.md"
    script: "scripts/run-ui-autofix.ps1"
  env:
    GREENAI_ACCESSIBILITY_GATES: "true"
    GREENAI_VISUAL_HEADLESS: "true"
  constraints:
    - no redesign
    - no architecture changes
    - no inline style attributes on Razor elements
    - max 3 iterations
  output:
    - files_modified
    - fixes_applied
    - remaining_failures
    - iteration_count

---

# ── References ────────────────────────────────────────────────────────────────

references:
  ssot_map: "docs/SSOT/governance/GOVERNANCE_MAP.md"
  ai_contract: "AI_WORK_CONTRACT.md"
  backend_patterns: "docs/SSOT/backend/patterns/"
