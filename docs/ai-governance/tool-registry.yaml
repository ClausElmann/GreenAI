# AI Tool Registry — green-ai
#
# Purpose: Define ALL tools AI may use. Nothing else allowed.
# Authority: ABSOLUTE — using an unregistered tool is a governance violation.
# Last Updated: 2026-04-04
#
# Context:
#   Runtime:  .NET 10, Blazor Server, port 5057 (http, NOT https)
#   Database: GreenAI_DEV on (localdb)\MSSQLLocalDB
#   Auth:     POST /api/auth/login → JWT (dev: claus.elmann@gmail.com / Flipper12#)
#   Health:   GET /api/ping → 200 OK

---

version: "1.0"
enforced: true

---

# ── Build Tools ──────────────────────────────────────────────────────────────

build_tools:
  build_solution:
    command: "dotnet build src/GreenAi.Api/GreenAi.Api.csproj -v q"
    purpose: "Compile entire solution"
    timeout_seconds: 60
    success_criteria: "0 errors, 0 warnings"
    failure_action: "stop — fix build errors first"
    cwd: "c:\\Udvikling\\green-ai"

---

# ── Test Runners ─────────────────────────────────────────────────────────────

test_runners:
  unit_and_db_tests:
    command: "dotnet test tests/GreenAi.Tests -v q"
    purpose: "Run all xUnit tests (unit + DB integration)"
    timeout_seconds: 120
    output_location: "tests/GreenAi.Tests/TestResults/"
    cwd: "c:\\Udvikling\\green-ai"
    notes: "dotnet test IS correct here — no Playwright, no Angular shell, no backend needed"
    mandatory_rules:
      - "Run with --logger trx to get TRX output"
      - "After test run: pwsh -File scripts/testing/Get-FailedTestsFromTrx.ps1 to parse failures"

  run_with_trx:
    command: "dotnet test tests/GreenAi.Tests --logger trx -v q"
    purpose: "Run tests with TRX output for failure parsing"
    timeout_seconds: 120
    output_location: "tests/GreenAi.Tests/TestResults/*.trx"

  filter_test:
    command: "dotnet test tests/GreenAi.Tests --filter \"FullyQualifiedName~<TestName>\" -v n"
    purpose: "Run specific test by name"
    timeout_seconds: 60

  visual_tests:
    command: "dotnet test tests/GreenAi.E2E --filter \"FullyQualifiedName~Visual\" --nologo"
    purpose: "Run all multi-device visual tests (Playwright, headless Chromium)"
    timeout_seconds: 300
    output_location: "tests/GreenAi.E2E/TestResults/Visual/current/{device}/*.png"
    notes:
      - "Requires app running on http://localhost:5057"
      - "Produces screenshots in current/ — NOT baseline/"
      - "Set GREENAI_UPDATE_BASELINE=true to overwrite baselines"

  visual_analysis_export:
    command: "dotnet test tests/GreenAi.E2E --filter ExportVisualAnalysisPackage --nologo -v n"
    purpose: "Package latest Playwright screenshots into analysis-pack.zip for external AI review"
    timeout_seconds: 30
    output_location: "tests/GreenAi.E2E/TestResults/Visual/analysis-pack.zip"
    trigger_patterns:
      - "visual analysis"
      - "analyze UI screenshots"
      - "export screenshots"
      - "UI QA review"
      - "screenshot analysis"
      - "playwright screenshots"
    notes:
      - "Run visual_tests FIRST to produce screenshots (current/ must exist)"
      - "No AI integration inside system — export only"
      - "Upload ZIP + instructions.json to ChatGPT/Claude for external analysis"
      - "See: docs/SSOT/testing/visual-analysis.md"
    ssot: "docs/SSOT/testing/visual-analysis.md"

---

# ── Debug Tools ───────────────────────────────────────────────────────────────

debug_tools:
  sql_validator:
    command: "pwsh -File scripts/debug/Test-SqlStatement.ps1"
    parameters:
      - name: "SqlStatement"
        description: "SQL query to validate (select/insert/update/delete)"
        required: false  # OR use SqlFile
        example: "-SqlStatement \"SELECT * FROM Users WHERE Id = @Id\""
      - name: "SqlFile"
        description: "Path to .sql embedded resource file"
        required: false
        example: "-SqlFile src/GreenAi.Api/Features/Auth/Login/Login.sql"
      - name: "Parameters"
        description: "Hashtable of @{ ParamName = SampleValue }"
        required: false
        example: "-Parameters @{ Id = 1; Email = \"test@test.com\" }"
      - name: "ShowDetails"
        description: "Show full SQL with parameter DECLARE statements"
        required: false
        example: "-ShowDetails"
    purpose: >
      ⚡ SQL PRE-VALIDATION: When handler/test fails with SQL error →
      extract SQL from .sql file → validate against GreenAI_DEV → get EXACT error in 5 seconds.
      10x faster than trial-and-error via dotnet test.
    timeout_seconds: 10
    exit_codes:
      0: "✓ SQL valid — query executed successfully"
      1: "✗ SQL invalid — diagnosis + fix options shown in output"
    ai_workflow:
      trigger_patterns:
        - "Test fails with 400/500 and SQL-related error"
        - "Handler throws 'Invalid column name' / 'NULL constraint' / 'CHECK constraint'"
        - "After adding new columns to a migration"
        - "Before committing SQL changes"
      execution_sequence:
        - "STEP 1: Identify failing .sql file (in Features/<Domain>/<Feature>/)"
        - "STEP 2: Extract representative @Parameters from test arrange section"
        - "STEP 3: Run: pwsh -File scripts/debug/Test-SqlStatement.ps1 -SqlFile <path> -Parameters @{...}"
        - "STEP 4: Read diagnosis + fix options"
        - "STEP 5: Fix SQL / schema / handler"
        - "STEP 6: Rerun validator → green → run dotnet test"
    mandatory_rules:
      - "⚡ ALWAYS use this before adding diagnostic logging for SQL errors"
      - "⚡ ALWAYS extract real @Params from test code — don't guess values"
      - "⚡ Read ALL fix options before acting"
      - "NEVER skip this to save time — 5 seconds now vs 5 minutes later"

  get_latest_errors:
    command: "pwsh -File scripts/testing/Get-Latest-Errors.ps1"
    parameters:
      - name: "LastMinutes"
        default: 10
        example: "-LastMinutes 30"
      - name: "Level"
        options: ["All", "Warning", "Error"]
        default: "Error"
        example: "-Level Warning"
    purpose: "Query [dbo].[Logs] in GreenAI_DEV for recent backend errors"
    timeout_seconds: 10
    ai_workflow:
      trigger_patterns:
        - "Test fails but no exception in test output"
        - "HTTP 500 with no visible error message"
        - "After running tests — check for backend-side errors"
      notes: "Backend must have been running recently (Serilog writes to Logs table)"

  get_failed_tests:
    command: "pwsh -File scripts/testing/Get-FailedTestsFromTrx.ps1"
    purpose: "Parse newest TRX file and show failing tests with error messages"
    timeout_seconds: 5
    notes: "Run after: dotnet test tests/GreenAi.Tests --logger trx"

---

# ── Database Tools ────────────────────────────────────────────────────────────

database_tools:
  restore_production_backup:
    command: "pwsh -File scripts/database/Restore-ProductionBackup.ps1"
    parameters:
      - name: "BackupPath"
        description: "Path to .bak file. Default: auto-finds latest greenai_prod*.bak in Downloads."
        required: false
        example: "-BackupPath C:\\Backups\\greenai_prod_2026-04-04.bak"
      - name: "Force"
        description: "Skip confirmation prompt."
        required: false
        example: "-Force"
    purpose: >
      Restore a production .bak file to GreenAI_DEV on LocalDB.
      Dev is a mirror of prod — use this to sync schema and data, then
      DbUp migrations are re-applied on top to add any dev-only objects.
    trigger_patterns:
      - "restore backup"
      - "sync from prod"
      - "production backup"
      - "dev is behind prod"
      - "schema mismatch"
      - ".bak"
    what_it_does:
      - "1. Auto-finds latest greenai_prod*.bak in Downloads (or uses -BackupPath)"
      - "2. Verifies / starts MSSQLLocalDB"
      - "3. Drops + re-creates GreenAI_DEV from the .bak"
      - "4. Re-runs DbUp migrations (dev-only schema on top of prod)"
      - "5. Reports table count so you can verify completeness"
    backup_naming_convention: "greenai_prod_YYYY-MM-DD.bak → save to %USERPROFILE%\\Downloads\\"
    cwd: "c:\\Udvikling\\green-ai"
    exit_codes:
      0: "GreenAI_DEV restored and migrations applied"
      1: "Failure — check output for details"
    mandatory_rules:
      - "ALWAYS run from repo root (c:\\Udvikling\\green-ai)"
      - "Stop the backend (dotnet run) before restoring — LocalDB file may be locked"
      - "After restore: re-seed E2E data if running E2E tests (E2EDatabaseFixture handles this automatically)"

---

# ── PowerShell Modules ────────────────────────────────────────────────────────
# Location: scripts/modules/
# Import pattern: Import-Module (Join-Path $PSScriptRoot "..\modules\Core.psm1") -Force

modules:
  Core.psm1:
    functions:
      - Get-Timestamp       # Formatted timestamp string
      - Get-AppSettings     # Read appsettings.Development.json (cached)
      - Get-ConnectionString  # Return (localdb)\MSSQLLocalDB;GreenAI_DEV
      - Get-BaseUrl         # "http://localhost:5057"
      - Get-Credentials     # @{ Email="admin@dev.local"; Password="dev123" }
    dependencies: []

  Backend.psm1:
    functions:
      - Stop-BackendProcesses  # Kill running GreenAi.Api processes
      - Clear-Port5057         # Kill process on port 5057
      - Build-Backend          # dotnet build GreenAi.Api.csproj
      - Start-BackendAsync     # Start backend as PS background job
      - Wait-ForBackendReady   # Poll /api/ping until 200 or timeout (45s)
      - Stop-Backend           # Stop background job + processes
      - Test-BackendHealth     # Single health check → bool
    dependencies: [Core.psm1]

  Http.psm1:
    functions:
      - Get-AuthToken          # POST /api/auth/login → JWT string
      - Get-AuthHeaders        # @{ Authorization = "Bearer <token>" }
      - Invoke-HttpRequest     # Generic (all methods), returns @{Success; StatusCode; Body; Raw; Error}
      - Invoke-GetRequest      # GET wrapper
      - Invoke-PostRequest     # POST wrapper
      - Invoke-PutRequest      # PUT wrapper
      - Invoke-DeleteRequest   # DELETE wrapper
    dependencies: [Core.psm1]

  Database.psm1:
    functions:
      - Test-DatabaseConnection  # Quick ping → bool
      - Invoke-DatabaseQuery     # Run SELECT → PSObject[]
      - Invoke-DatabaseNonQuery  # Run INSERT/UPDATE/DELETE → rows affected (int)
    dependencies: []
    notes: "Uses sqlcmd CLI — no Invoke-Sqlcmd dependency"

  Output.psm1:
    functions:
      - Write-Header      # ═══ Section header box
      - Write-Success     # ✓ green
      - Write-Failure     # ✗ red
      - Write-Info        # ℹ cyan
      - Write-Warning     # ⚠ yellow
      - Write-Step        # [N] numbered step
      - Write-Detail      # indented DarkGray
      - Write-Separator   # ─── line
    dependencies: []

---

